<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.css" integrity="sha512-zylce7fP6h4usg536JBTRj2rt7q22Z0qicHSlgSK53Irtfkz37ate3KCQ59du+aXZV6R3yyL2X1LyGKBEUMZaw==" crossorigin="anonymous" />
  </head>
  <body>
    <div class="col-12 d-flex" style="height: 100vh">
      <div class="col-8 h-100 p-4 overflow-auto">
        <div class="d-flex gap-3">
          <button class="btn btn-dark" onclick="filterProducts('Apple')">Apple</button>
          <button class="btn btn-dark" onclick="filterProducts('Samsung')">Samsung Products</button>
          <button class="btn btn-dark" onclick="filterProducts('Oppo')">Oppo Products</button>
          <button class="btn btn-danger" onclick="filterProducts('All')">Clear Fillters</button>
        </div>
        <div class="row g-3" id="productsDiv"></div>
      </div>
      <div class="col-4 h-100 border border-s p-4 overflow-auto">
        <h1>Your Cart</h1>
        <table class="table table-dark table-bordered align-middle">
          <thead>
            <tr>
              <th>#</th>
              <th>Item Name</th>
              <th>Item Price</th>
              <th>Item Qty</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody></tbody>
          <tfoot>
            <tr>
              <td colspan="3">Total</td>
              <td colspan="2">$ <span id="totalSpan">----</span></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.js" integrity="sha512-GKxQGmCBqm3YHCZTdqD3Bvsz+AHRObqztq6xDo+68527RxgVw7wF1TR5ZSBvtWiz5qzpOzUGGvxJbT/6UzzSOQ==" crossorigin="anonymous"></script>
    <script src="./data.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
